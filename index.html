<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist Skimmer — storytellers.records</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101214;
    --panel:#16191c;
    --ink:#e9e6df;
    --ink-dim:#8a9096;
    --line:#24282c;
    --accent:#e8a775;   /* copper */
    --accent-dim:#7a5a41;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    display:flex;align-items:flex-start;justify-content:center;
    padding:40px 24px;
  }
  .app{width:100%;max-width:560px}

  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:12px}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--accent);
  }
  .status-pill{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-dim);
    white-space:nowrap;align-self:center;padding-left:4px;text-align:right;
  }
  .status-pill.live{color:var(--accent)}
  .mute-btn{
    background:none;border:0;cursor:pointer;padding:2px 4px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-dim);
  }
  .mute-btn:hover{color:var(--ink)}
  .mute-btn.on{color:var(--accent)}
  .mute-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  h1{font-weight:300;font-size:26px;letter-spacing:-.01em;margin-bottom:20px}
  h1 em{font-style:normal;font-weight:600;color:var(--accent)}

  .loader{display:flex;gap:10px;margin-bottom:10px;align-items:stretch}
  .loader input{
    flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);
    border-radius:6px;color:var(--ink);padding:11px 14px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.02em;
  }
  .loader input:focus{outline:none;border-color:var(--accent-dim)}
  .loader input::placeholder{color:var(--ink-dim);opacity:.6}

  /* ---- playlist queue ---- */
  .queue{margin-bottom:18px}
  .queue-item{
    display:flex;align-items:center;gap:12px;
    border:1px solid var(--line);border-radius:6px;background:var(--panel);
    padding:9px 12px;margin-bottom:6px;cursor:pointer;
    transition:border-color .15s;
  }
  .queue-item:hover{border-color:var(--accent-dim)}
  .queue-item.active{border-color:var(--accent)}
  .queue-item .qnum{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);
    width:16px;flex-shrink:0;
  }
  .queue-item.active .qnum{color:var(--accent)}
  .queue-item .qname{
    flex:1;min-width:0;font-size:13px;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .queue-item.done .qname{color:var(--ink-dim);text-decoration:line-through}
  .queue-item .qmark{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--accent);flex-shrink:0;
  }
  .queue-item .qdel{
    background:none;border:0;color:var(--ink-dim);cursor:pointer;
    font-size:14px;line-height:1;padding:2px 4px;flex-shrink:0;
  }
  .queue-item .qdel:hover{color:#d98a8a}
  .queue-empty{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);
    padding:4px 2px;letter-spacing:.04em;
  }

  .strip{
    position:relative;height:4px;background:var(--line);
    border-radius:2px;overflow:hidden;margin-bottom:14px;
  }
  .strip .fill{
    position:absolute;inset:0;transform-origin:left;
    transform:scaleX(0);background:var(--accent);
  }

  .now{
    display:flex;justify-content:space-between;gap:16px;align-items:baseline;
    margin-bottom:16px;min-height:22px;
  }
  .now .title{
    font-size:15px;font-weight:400;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .stats{
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-dim);
    flex-shrink:0;display:flex;gap:14px;
  }
  .stats .stat b{color:var(--accent);font-weight:500}
  .stats .lbl{
    font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-dim);margin-right:6px;
  }

  .player{
    border:1px solid var(--line);border-radius:8px;overflow:hidden;
    background:var(--panel);margin-bottom:16px;
  }
  iframe{display:block;width:100%;height:166px;border:0}

  .controls{display:flex;flex-direction:column;gap:10px}
  .row{display:flex;gap:10px;align-items:stretch}
  button{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;cursor:pointer;border-radius:6px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);
    padding:12px 18px;transition:border-color .15s,color .15s,background .15s;
  }
  button:hover{border-color:var(--accent-dim)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  button.primary{background:var(--accent);border-color:var(--accent);color:#101214;font-weight:500;flex:1;min-width:120px}
  button.primary:hover{background:#f0b284}
  button.stop{border-color:#5a3030;color:#d98a8a}
  button.stop:hover{border-color:#b33d3d;color:#e8a1a1}
  button:disabled{opacity:.35;cursor:not-allowed}
  button:disabled:hover{border-color:var(--line);background:var(--panel)}
  button.primary:disabled:hover{background:var(--accent)}

  .setting{
    flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px;
    border:1px solid var(--line);border-radius:6px;background:var(--panel);
    padding:10px 14px;
  }
  .setting label{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-dim);
  }
  .setting input{
    width:56px;background:transparent;border:0;color:var(--ink);
    font-family:'IBM Plex Mono',monospace;font-size:14px;text-align:right;
  }
  .setting input:focus{outline:none;color:var(--accent)}
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield;appearance:textfield}
  .setting .hint{
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-dim);opacity:.7;
  }

  .log{
    margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:11px;
    color:var(--ink-dim);letter-spacing:.04em;min-height:16px;
  }
  .log b{color:var(--accent);font-weight:500}

  /* ---- password gate ---- */
  .gate{
    position:fixed;inset:0;z-index:100;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .gate.hidden{display:none}
  .gate-box{width:100%;max-width:340px;text-align:center}
  .gate-brand{
    font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--accent);margin-bottom:10px;
  }
  .gate-msg{font-weight:300;font-size:15px;color:var(--ink-dim);margin-bottom:22px}
  .gate-row{display:flex;gap:10px}
  .gate-row input{
    flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);
    border-radius:6px;color:var(--ink);padding:12px 14px;text-align:center;
    font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:.3em;
  }
  .gate-row input:focus{outline:none;border-color:var(--accent-dim)}
  .gate-err{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:#d98a8a;
    margin-top:14px;min-height:14px;letter-spacing:.06em;
  }
  .gate-box.shake{animation:shake .3s}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-7px)}
    75%{transform:translateX(7px)}
  }

  @media (prefers-reduced-motion: reduce){
    .strip .fill{transition:none !important}
    .gate-box.shake{animation:none}
  }
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="gate-box" id="gateBox">
    <div class="gate-brand">storytellers</div>
    <div class="gate-msg">Enter the password to continue</div>
    <div class="gate-row">
      <input id="gatePass" type="password" autocomplete="current-password" autofocus>
      <button class="primary" id="gateBtn">Unlock</button>
    </div>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div class="app">
  <div class="head">
    <div class="eyebrow">storytellers.records</div>
    <button class="mute-btn" id="muteBtn" title="Mute playback">&#128266; sound</button>
  </div>
  <h1>Playlist <em>Skimmer</em></h1>

  <div class="loader">
    <input id="plUrl" type="url" placeholder="https://soundcloud.com/…/sets/…" spellcheck="false">
    <button id="addBtn">Add</button>
    <div class="status-pill" id="status">standby</div>
  </div>

  <div class="queue" id="queueList"></div>

  <div class="strip"><div class="fill" id="fill"></div></div>

  <div class="now">
    <div class="title" id="trackTitle">Add a playlist to begin.</div>
    <div class="stats">
      <span class="stat"><span class="lbl">list</span><b id="qIdx">–</b>/<span id="qTotal">–</span></span>
      <span class="stat"><span class="lbl">track</span><b id="idx">–</b>/<span id="total">–</span></span>
      <span class="stat"><span class="lbl">loop</span><b id="loopCur">0</b><span id="loopMax">/&infin;</span></span>
    </div>
  </div>

  <div class="player">
    <iframe id="sc" allow="autoplay"
      src="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fstorytellers-records%2Fsets%2Fa-distinctive-array-of-hits-2026&auto_play=false&show_teaser=false&visual=false&show_comments=false">
    </iframe>
  </div>

  <div class="controls">
    <div class="row">
      <button class="primary" id="startBtn" disabled>Start</button>
      <button class="stop" id="stopBtn" disabled>Stop</button>
    </div>
    <div class="row">
      <div class="setting">
        <label for="secs">sec / track</label>
        <input id="secs" type="number" min="2" max="60" step="1" value="5">
      </div>
      <div class="setting" title="How many times the whole queue plays (all playlists once = 1 loop). 0 = repeat forever.">
        <label for="maxLoops">loops</label>
        <span class="hint">0 = &infin;</span>
        <input id="maxLoops" type="number" min="0" max="999" step="1" value="0">
      </div>
    </div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
(function(){
  var HASH = 'e24ef8f938288781086e27a9433a4d0472a1dbaac31cfe54be2c3525fa30cb2e';
  var gate = document.getElementById('gate');
  var box  = document.getElementById('gateBox');
  var inp  = document.getElementById('gatePass');
  var btn  = document.getElementById('gateBtn');
  var err  = document.getElementById('gateErr');

  function sha256hex(str){
    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(function(buf){
      return Array.from(new Uint8Array(buf)).map(function(b){
        return b.toString(16).padStart(2, '0');
      }).join('');
    });
  }

  function unlock(){
    gate.classList.add('hidden');
    try { localStorage.setItem('skimmer.auth', HASH); } catch(e){}
  }

  try {
    if (localStorage.getItem('skimmer.auth') === HASH){ gate.classList.add('hidden'); }
  } catch(e){}

  function attempt(){
    var v = inp.value;
    if (!v) return;
    if (!window.crypto || !crypto.subtle){
      err.textContent = 'This page needs HTTPS to verify the password.';
      return;
    }
    sha256hex(v).then(function(h){
      if (h === HASH){
        unlock();
      } else {
        err.textContent = 'Wrong password.';
        inp.value = '';
        box.classList.remove('shake');
        void box.offsetWidth;
        box.classList.add('shake');
        inp.focus();
      }
    });
  }

  btn.addEventListener('click', attempt);
  inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') attempt(); });
})();
</script>
<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
(function(){
  var MAX_QUEUE = 5;

  var widget     = SC.Widget(document.getElementById('sc'));
  var startBtn   = document.getElementById('startBtn');
  var stopBtn    = document.getElementById('stopBtn');
  var muteBtn    = document.getElementById('muteBtn');
  var addBtn     = document.getElementById('addBtn');
  var plUrlInput = document.getElementById('plUrl');
  var queueEl    = document.getElementById('queueList');
  var secsInput  = document.getElementById('secs');
  var maxLoopsIn = document.getElementById('maxLoops');
  var fill       = document.getElementById('fill');
  var statusEl   = document.getElementById('status');
  var titleEl    = document.getElementById('trackTitle');
  var qIdxEl     = document.getElementById('qIdx');
  var qTotalEl   = document.getElementById('qTotal');
  var idxEl      = document.getElementById('idx');
  var totalEl    = document.getElementById('total');
  var loopCurEl  = document.getElementById('loopCur');
  var loopMaxEl  = document.getElementById('loopMax');
  var logEl      = document.getElementById('log');

  var queue       = [];   // playlist URLs, max 5
  var qCur        = -1;   // index of active playlist in queue
  var running     = false;
  var muted       = false;
  var totalTracks = 0;
  var loops       = 0;    // full passes of the WHOLE QUEUE (all playlists once = 1 loop)
  var timer       = null;
  var raf         = null;
  var startedAt   = 0;
  var loadingQ    = false;

  // ---- persistence ----
  try {
    muted = localStorage.getItem('skimmer.muted') === '1';
    var savedQ = localStorage.getItem('skimmer.queue');
    if (savedQ){
      queue = JSON.parse(savedQ).slice(0, MAX_QUEUE);
    } else {
      var legacy = localStorage.getItem('skimmer.playlist'); // migrate old single-playlist key
      if (legacy) queue = [legacy];
    }
  } catch(e){ queue = []; }

  function saveQueue(){
    try { localStorage.setItem('skimmer.queue', JSON.stringify(queue)); } catch(e){}
  }

  // ---- helpers ----
  function seconds(){
    var v = parseInt(secsInput.value, 10);
    if (isNaN(v)) v = 5;
    return Math.min(60, Math.max(2, v));
  }

  function maxLoops(){
    var v = parseInt(maxLoopsIn.value, 10);
    if (isNaN(v) || v < 0) v = 0;
    return v; // 0 = infinite (single playlist) / whole queue on repeat (multiple)
  }

  function slugTitle(url){
    try {
      var parts = new URL(url).pathname.split('/').filter(Boolean);
      var slug = parts[parts.length - 1] || 'playlist';
      return slug.replace(/-/g, ' ');
    } catch(e){ return 'playlist'; }
  }

  function updateStats(){
    qIdxEl.textContent = qCur >= 0 ? (qCur + 1) : '–';
    qTotalEl.textContent = queue.length || '–';
    loopCurEl.textContent = loops;
    var m = maxLoops();
    loopMaxEl.innerHTML = m === 0 ? '/&infin;' : '/' + m;
  }

  function renderQueue(){
    queueEl.innerHTML = '';
    if (queue.length === 0){
      var empty = document.createElement('div');
      empty.className = 'queue-empty';
      empty.textContent = 'Queue empty — add up to ' + MAX_QUEUE + ' playlists.';
      queueEl.appendChild(empty);
    }
    queue.forEach(function(url, i){
      var item = document.createElement('div');
      item.className = 'queue-item' + (i === qCur ? ' active' : '');
      item.title = url;

      var num = document.createElement('span');
      num.className = 'qnum';
      num.textContent = (i + 1);

      var name = document.createElement('span');
      name.className = 'qname';
      name.textContent = slugTitle(url);

      var mark = document.createElement('span');
      mark.className = 'qmark';
      mark.textContent = i === qCur ? (running ? 'playing' : 'loaded') : '';

      var del = document.createElement('button');
      del.className = 'qdel';
      del.innerHTML = '&times;';
      del.title = 'Remove from queue';
      del.addEventListener('click', function(ev){
        ev.stopPropagation();
        removeFromQueue(i);
      });

      item.addEventListener('click', function(){ jumpToPlaylist(i); });
      item.appendChild(num); item.appendChild(name); item.appendChild(mark); item.appendChild(del);
      queueEl.appendChild(item);
    });
    addBtn.disabled = queue.length >= MAX_QUEUE;
    updateStats();
  }

  function applyMuteUI(){
    muteBtn.innerHTML = muted ? '&#128263; muted' : '&#128266; sound';
    muteBtn.classList.toggle('on', muted);
    muteBtn.title = muted ? 'Unmute playback' : 'Mute playback';
  }

  function applyVolume(){
    widget.setVolume(muted ? 0 : 100);
  }

  function setRunning(on){
    running = on;
    startBtn.disabled = on || totalTracks === 0;
    stopBtn.disabled = !on;
    if (on){
      statusEl.textContent = 'playing · ' + seconds() + 's/track';
      statusEl.classList.add('live');
    } else {
      statusEl.textContent = 'standby';
      statusEl.classList.remove('live');
      clearTimers();
    }
    renderQueue();
  }

  function clearTimers(){
    if (timer){ clearTimeout(timer); timer = null; }
    if (raf){ cancelAnimationFrame(raf); raf = null; }
    fill.style.transform = 'scaleX(0)';
  }

  function animateStrip(ms){
    startedAt = performance.now();
    function step(now){
      var p = Math.min(1, (now - startedAt) / ms);
      fill.style.transform = 'scaleX(' + p + ')';
      if (p < 1 && running) raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
  }

  function refreshNowPlaying(){
    widget.getCurrentSoundIndex(function(i){
      idxEl.textContent = (i + 1);
      widget.getCurrentSound(function(s){
        if (s && s.title) titleEl.textContent = s.title;
      });
    });
  }

  function armTimer(){
    clearTimers();
    if (!running) return;
    var ms = seconds() * 1000;
    animateStrip(ms);
    timer = setTimeout(advance, ms);
  }

  // ---- queue engine ----
  function loadPlaylistAt(qi, autoplay){
    if (qi < 0 || qi >= queue.length) return;
    loadingQ = true;
    qCur = qi;
    totalTracks = 0;
    clearTimers();
    startBtn.disabled = true;
    titleEl.textContent = 'Loading playlist ' + (qi + 1) + '…';
    renderQueue();
    widget.load(queue[qi], {
      auto_play: false,
      show_teaser: false,
      visual: false,
      show_comments: false,
      callback: function(){
        applyVolume();
        widget.getSounds(function(sounds){
          totalTracks = sounds ? sounds.length : 0;
          totalEl.textContent = totalTracks || '?';
          updateStats();
          loadingQ = false;
          if (totalTracks === 0){
            logEl.textContent = 'Playlist ' + (qi + 1) + ' has no playable tracks — skipping it.';
            nextPlaylist();
            return;
          }
          logEl.textContent = 'Playlist ' + (qi + 1) + '/' + queue.length + ' — ' + totalTracks + ' tracks.';
          if (autoplay && running){
            widget.play(); // PLAY event arms the timer
          } else {
            startBtn.disabled = running;
            titleEl.textContent = 'Playlist loaded — press Start.';
          }
        });
      }
    });
  }

  function nextPlaylist(){
    var nextQ = qCur + 1;
    if (nextQ >= queue.length){
      // whole queue finished once -> that is one loop
      loops++;
      updateStats();
      var target = maxLoops();
      if (target > 0 && loops >= target){
        setRunning(false);
        widget.pause();
        logEl.innerHTML = '<b>Done</b> — queue completed <b>' + loops + '</b> loop' + (loops === 1 ? '' : 's') + ' (' + queue.length + ' playlist' + (queue.length === 1 ? '' : 's') + ' each). Stopped automatically.';
        return;
      }
      logEl.innerHTML = 'Queue finished &rarr; <b>loop ' + (loops + 1) + '</b>, restarting from playlist 1.';
      if (queue.length === 1){
        widget.skip(0); // single playlist: just restart it, no reload needed
      } else {
        loadPlaylistAt(0, true);
      }
      return;
    }
    logEl.innerHTML = 'Moving to <b>playlist ' + (nextQ + 1) + '/' + queue.length + '</b>…';
    loadPlaylistAt(nextQ, true);
  }

  function advance(){
    widget.getCurrentSoundIndex(function(i){
      if (totalTracks > 0 && i >= totalTracks - 1){
        nextPlaylist(); // playlist finished its single pass for this queue loop
      } else {
        widget.skip(i + 1);
      }
    });
  }

  function addToQueue(url){
    if (!/^https:\/\/(www\.|m\.|on\.)?soundcloud\.com\//i.test(url)){
      logEl.textContent = 'That does not look like a soundcloud.com link — check the URL.';
      return;
    }
    if (queue.length >= MAX_QUEUE){
      logEl.textContent = 'Queue is full (' + MAX_QUEUE + ' playlists max).';
      return;
    }
    if (queue.indexOf(url) !== -1){
      logEl.textContent = 'That playlist is already in the queue.';
      return;
    }
    queue.push(url);
    saveQueue();
    plUrlInput.value = '';
    renderQueue();
    if (qCur === -1){
      loadPlaylistAt(0, false); // first playlist: load it, wait for Start
    } else {
      logEl.textContent = 'Added as playlist ' + queue.length + '/' + MAX_QUEUE + '.';
    }
  }

  function removeFromQueue(i){
    var removingActive = (i === qCur);
    queue.splice(i, 1);
    saveQueue();
    if (queue.length === 0){
      qCur = -1;
      setRunning(false);
      widget.pause();
      totalTracks = 0;
      totalEl.textContent = '–';
      idxEl.textContent = '–';
      loops = 0;
      titleEl.textContent = 'Add a playlist to begin.';
        renderQueue();
      logEl.textContent = 'Queue cleared.';
      return;
    }
    if (removingActive){
      var wasRunning = running;
      if (i >= queue.length) i = 0; // removed the last item → wrap to first
      loadPlaylistAt(i, wasRunning);
    } else {
      if (i < qCur) qCur--; // keep pointer on the same playlist
      renderQueue();
    }
  }

  function jumpToPlaylist(i){
    if (i === qCur || loadingQ) return;
    loadPlaylistAt(i, running);
  }

  // ---- widget events ----
  var booted = false;
  widget.bind(SC.Widget.Events.READY, function(){
    if (booted) return; // READY also fires after widget.load — handled by its callback
    booted = true;
    renderQueue();
    if (queue.length > 0){
      loadPlaylistAt(0, false);
    } else {
      }
  });

  widget.bind(SC.Widget.Events.PLAY, function(){
    applyVolume();
    refreshNowPlaying();
    if (running) armTimer();
  });

  widget.bind(SC.Widget.Events.FINISH, function(){
    if (running){ clearTimers(); advance(); }
  });

  widget.bind(SC.Widget.Events.ERROR, function(){
    logEl.textContent = 'Playback error — skipping this track.';
    if (running){ clearTimers(); advance(); }
  });

  // ---- controls ----
  addBtn.addEventListener('click', function(){
    var url = plUrlInput.value.trim();
    if (url) addToQueue(url);
  });
  plUrlInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter') addBtn.click();
  });

  startBtn.addEventListener('click', function(){
    if (queue.length === 0 || totalTracks === 0) return;
    var target = maxLoops();
    if (target > 0 && loops >= target){
      // fresh run after a finished cycle: reset counter, restart queue from the top
      loops = 0;
      updateStats();
      setRunning(true);
      if (qCur === 0){ widget.skip(0); } else { loadPlaylistAt(0, true); }
    } else {
      setRunning(true);
      widget.play();
    }
  });

  stopBtn.addEventListener('click', function(){
    setRunning(false);
    widget.pause();
  });

  secsInput.addEventListener('change', function(){
    secsInput.value = seconds();
    if (running){
      statusEl.textContent = 'playing · ' + seconds() + 's/track';
      armTimer();
    }
  });

  maxLoopsIn.addEventListener('change', function(){
    maxLoopsIn.value = maxLoops();
    updateStats();
  });

  muteBtn.addEventListener('click', function(){
    muted = !muted;
    applyMuteUI();
    applyVolume();
    try { localStorage.setItem('skimmer.muted', muted ? '1' : '0'); } catch(e){}
  });

  applyMuteUI();
  renderQueue();
})();
</script>
</body>
</html>
